<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PumpWatch - AI Market Integrity Guard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0e27;
            color: #e0e6ed;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #1e2a4a;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #4a9eff;
        }

        .status {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }

        .status-item {
            padding: 8px 16px;
            background: #1a2332;
            border-radius: 6px;
        }

        .status-live {
            color: #4ade80;
        }

        /* Search Section */
        .search-section {
            background: #141b2d;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            background: #1a2332;
            border: 2px solid #2a3a5a;
            border-radius: 8px;
            color: #e0e6ed;
            font-size: 16px;
        }

        .search-input:focus {
            outline: none;
            border-color: #4a9eff;
        }

        .search-btn {
            padding: 15px 30px;
            background: #4a9eff;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }

        .search-btn:hover {
            background: #3a8eef;
        }

        /* Grid Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* Risk Score Card */
        .risk-card {
            background: #141b2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .risk-score-circle {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            position: relative;
        }

        .risk-score-circle.red {
            background: conic-gradient(#ef4444 0% var(--score), #1a2332 var(--score) 100%);
        }

        .risk-score-circle.orange {
            background: conic-gradient(#f59e0b 0% var(--score), #1a2332 var(--score) 100%);
        }

        .risk-score-circle.green {
            background: conic-gradient(#10b981 0% var(--score), #1a2332 var(--score) 100%);
        }

        .risk-score-inner {
            width: 170px;
            height: 170px;
            background: #141b2d;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .risk-label {
            text-align: center;
            margin-top: 10px;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
        }

        .risk-label.red { background: #ef4444; }
        .risk-label.orange { background: #f59e0b; }
        .risk-label.green { background: #10b981; }

        /* Live Alerts */
        .alerts-card {
            background: #141b2d;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            max-height: 500px;
            overflow-y: auto;
        }

        .alerts-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1e2a4a;
        }

        .alert-item {
            padding: 15px;
            background: #1a2332;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .alert-item:hover {
            transform: translateX(5px);
        }

        .alert-item.red { border-left-color: #ef4444; }
        .alert-item.orange { border-left-color: #f59e0b; }
        .alert-item.yellow { border-left-color: #eab308; }

        .alert-ticker {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }

        .alert-time {
            font-size: 12px;
            color: #94a3b8;
        }

        /* Evidence Section */
        .evidence-section {
            background: #141b2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .evidence-item {
            padding: 20px;
            background: #1a2332;
            border-radius: 8px;
            border-left: 4px solid;
        }

        .evidence-item.critical { border-left-color: #ef4444; }
        .evidence-item.high { border-left-color: #f59e0b; }
        .evidence-item.medium { border-left-color: #eab308; }
        .evidence-item.low { border-left-color: #10b981; }

        .evidence-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .evidence-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 5px;
        }

        .evidence-value {
            font-size: 16px;
            font-weight: 600;
        }

        /* Why Panel */
        .why-panel {
            background: #141b2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .why-content {
            background: #1a2332;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            line-height: 1.8;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .spinner {
            border: 3px solid #1a2332;
            border-top: 3px solid #4a9eff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a2332;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a3a5a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3a4a6a;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #4a9eff;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🛡️ PumpWatch</div>
            <div class="status">
                <div class="status-item status-live">● Live</div>
                <div class="status-item" id="ticker-count">0 Tickers</div>
                <div class="status-item" id="alert-count">0 Alerts</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <h2 class="section-title">Ticker Search</h2>
            <div class="search-box">
                <input type="text" class="search-input" id="ticker-input" placeholder="Enter ticker (e.g., RELIANCE, TCS, INFY)" />
                <button class="search-btn" onclick="searchTicker()">🔍 Search</button>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Risk Score Card -->
            <div class="risk-card">
                <h2 class="section-title">Risk Assessment</h2>
                <div id="risk-display" class="empty-state">
                    Search for a ticker to see risk analysis
                </div>
            </div>

            <!-- Live Alerts -->
            <div class="alerts-card">
                <div class="alerts-header">
                    <h2 class="section-title" style="margin: 0;">🚨 Live Alerts</h2>
                    <button class="search-btn" style="padding: 8px 16px; font-size: 14px;" onclick="refreshAlerts()">Refresh</button>
                </div>
                <div id="alerts-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        Loading alerts...
                    </div>
                </div>
            </div>
        </div>

        <!-- Evidence Section -->
        <div class="evidence-section" id="evidence-section" style="display: none;">
            <h2 class="section-title">📊 Evidence</h2>
            <div class="evidence-grid" id="evidence-grid"></div>
        </div>

        <!-- Why Panel -->
        <div class="why-panel" id="why-panel" style="display: none;">
            <h2 class="section-title">💡 Why is this risky?</h2>
            <div class="why-content" id="why-content"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080';
        let currentTicker = null;

        // Search ticker
        async function searchTicker() {
            const ticker = document.getElementById('ticker-input').value.trim().toUpperCase();
            if (!ticker) return;

            currentTicker = ticker;
            document.getElementById('risk-display').innerHTML = '<div class="loading"><div class="spinner"></div>Analyzing...</div>';
            document.getElementById('evidence-section').style.display = 'none';
            document.getElementById('why-panel').style.display = 'none';

            try {
                // Get comprehensive analysis
                const response = await fetch(`${API_BASE}/ticker-analysis/${ticker}`);
                const data = await response.json();

                displayRiskScore(data);
                await displayEvidence(ticker);
                await displayWhy(ticker);
            } catch (error) {
                document.getElementById('risk-display').innerHTML = `<div class="empty-state">Error: ${error.message}</div>`;
            }
        }

        // Display risk score
        function displayRiskScore(data) {
            const score = data.risk_assessment.score;
            const level = data.risk_assessment.level;
            const color = data.risk_assessment.color.toLowerCase();

            const html = `
                <div class="risk-score-circle ${color}" style="--score: ${score}%">
                    <div class="risk-score-inner">
                        <div style="font-size: 48px;">${score}</div>
                        <div style="font-size: 14px; color: #94a3b8;">/100</div>
                    </div>
                </div>
                <div class="risk-label ${color}">${level}</div>
            `;

            document.getElementById('risk-display').innerHTML = html;
        }

        // Display evidence
        async function displayEvidence(ticker) {
            try {
                const response = await fetch(`${API_BASE}/evidence/${ticker}`);
                const data = await response.json();

                const evidenceGrid = document.getElementById('evidence-grid');
                evidenceGrid.innerHTML = '';

                data.evidence_items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = `evidence-item ${item.severity}`;
                    div.innerHTML = `
                        <div class="evidence-icon">${item.icon}</div>
                        <div class="evidence-label">${item.label}</div>
                        <div class="evidence-value">${item.value}</div>
                    `;
                    evidenceGrid.appendChild(div);
                });

                document.getElementById('evidence-section').style.display = 'block';
            } catch (error) {
                console.error('Error loading evidence:', error);
            }
        }

        // Display why explanation
        async function displayWhy(ticker) {
            try {
                const response = await fetch(`${API_BASE}/why-risky/${ticker}`);
                const data = await response.json();

                document.getElementById('why-content').textContent = data.explanation;
                document.getElementById('why-panel').style.display = 'block';
            } catch (error) {
                console.error('Error loading explanation:', error);
            }
        }

        // Refresh alerts
        async function refreshAlerts() {
            const alertsList = document.getElementById('alerts-list');
            alertsList.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

            try {
                // First check if backend is running
                const healthResponse = await fetch(`${API_BASE}/health`);
                if (!healthResponse.ok) {
                    throw new Error('Backend not responding');
                }

                const response = await fetch(`${API_BASE}/smart-alerts`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();

                alertsList.innerHTML = '';

                // Display alerts
                if (data.alerts.length === 0 && data.needs_review.length === 0) {
                    alertsList.innerHTML = '<div class="empty-state">No alerts - waiting for data</div>';
                    return;
                }

                // High priority alerts
                data.alerts.forEach(alert => {
                    const div = document.createElement('div');
                    div.className = `alert-item ${alert.risk_score >= 75 ? 'red' : 'orange'}`;
                    div.onclick = () => {
                        document.getElementById('ticker-input').value = alert.ticker;
                        searchTicker();
                    };
                    div.innerHTML = `
                        <div class="alert-ticker">${alert.ticker} - Risk ${alert.risk_score}</div>
                        <div class="alert-time">Confidence: ${alert.confidence}% | ${alert.agreement_level}</div>
                    `;
                    alertsList.appendChild(div);
                });

                // Needs review
                data.needs_review.forEach(alert => {
                    const div = document.createElement('div');
                    div.className = 'alert-item yellow';
                    div.onclick = () => {
                        document.getElementById('ticker-input').value = alert.ticker;
                        searchTicker();
                    };
                    div.innerHTML = `
                        <div class="alert-ticker">${alert.ticker} - Needs Review ⚠️</div>
                        <div class="alert-time">${alert.reason}</div>
                    `;
                    alertsList.appendChild(div);
                });

                // Update header count
                document.getElementById('alert-count').textContent = `${data.summary.total_alerts} Alerts`;
            } catch (error) {
                alertsList.innerHTML = `<div class="empty-state">⚠️ Backend not running<br><small>Start with: python main.py</small></div>`;
                console.error('Error:', error);
            }
        }

        // Load ticker count
        async function loadTickerCount() {
            try {
                const response = await fetch(`${API_BASE}/tickers`);
                const data = await response.json();
                document.getElementById('ticker-count').textContent = `${data.total_unique} Tickers`;
            } catch (error) {
                console.error('Error loading ticker count:', error);
            }
        }

        // Enter key to search
        document.getElementById('ticker-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchTicker();
        });

        // Initial load
        refreshAlerts();
        loadTickerCount();

        // Auto-refresh alerts every 30 seconds
        setInterval(refreshAlerts, 30000);
    </script>
</body>
</html>
